compositions:
  facade_nvf:
    trigger: [вентилируем, вентфасад, нвф, навесн]
    required: [подсистем, утеплител, облицов]
    total_range: {min: 4000, max: 10000, unit: м2}
  tile_work:
    trigger: [облицовка плит, плиточн, облицовка стен керам, кафел]
    required: [плитк, керам, камен, мозаик]
    required_mode: any
    total_range: {min: 1500, max: 6000, unit: м2}
    note: "required_mode=any: хотя бы один из keywords должен быть"
  masonry_gazbeton:
    trigger: [кладка газобетон, кладка блок ячеист]
    required: [блок, клей, раствор]
    total_range: {min: 2000, max: 5000, unit: м2}
  concrete_monolith:
    trigger: [бетонирован, монолитн]
    required: [бетон, арматур]
    required_mode: all
    total_range: {min: 10000, max: 40000, unit: м3}
  waterproofing:
    trigger: [гидроизоляц]
    required: [гидроизоляц, рулонн, мастик, битум, мембран, наплавл, пленк, плёнк, изоляц, праймер]
    required_mode: any
    total_range: {min: 300, max: 2000, unit: м2}
  plaster_work:
    trigger: [оштукатурив, штукатурн]
    required: [штукатурк, смесь, раствор]
    required_mode: any
    total_range: {min: 400, max: 2000, unit: м2}

