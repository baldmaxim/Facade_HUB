# =============================================================================
# VOR Auto-Pricing Configuration
# =============================================================================
#
# Paths are relative to the project root (C:\vor-rebuild1\backend).
#
# Expert keys MUST match ExpertDomain enum values in models.py:
#   masonry, concrete, electrical, facade, roofing, hvac, earthworks, finishing
#

# ---------------------------------------------------------------------------
# Price providers (tried in order — first = highest priority)
# ---------------------------------------------------------------------------
providers:
  - type: gesn_sqlite
    path: data/gesn.db

# ---------------------------------------------------------------------------
# Domain experts — each expert handles a set of GESN collections
# ---------------------------------------------------------------------------
experts:
  masonry:
    domain: "masonry"
    collections: ["08"]
    keywords:
      - кладк
      - кирпич
      - газобетон
      - газосиликат
      - блок
      - ПГП
      - перегородк
    encyclopedia: "skills/kladka-expert/ENCYCLOPEDIA_FINAL.md"
    supplements:
      - "skills/kladka-expert/vor_parsing_rules.md"
    waste_defaults:
      кирпич: 0.03
      газобетон: 0.03
      раствор: 0.02

  concrete:
    domain: "concrete"
    collections: ["06", "07"]
    keywords:
      - бетон
      - монолит
      - ж/б
      - железобетон
      - арматур
      - опалуб
      - фундамент
      - свай
    encyclopedia: "skills/monolit-expert/ENCYCLOPEDIA_MONOLIT.md"
    waste_defaults:
      бетон: 0.02
      арматура: 0.08

  electrical:
    domain: "electrical"
    collections: ["21", "33"]
    keywords:
      - электр
      - кабел
      - провод
      - щит
      - автомат
      - розетк
      - освещ
    encyclopedia: "skills/electro-expert/ENCYCLOPEDIA_ELECTRO.md"

  facade:
    domain: "facade"
    collections: ["15", "26"]
    keywords:
      - фасад
      - утеплен
      - штукатур
      - облицов
      - навесн
    encyclopedia: "skills/fasad-expert/ENCYCLOPEDIA_FASAD.md"
    waste_defaults:
      утеплитель_минвата: 0.15
      утеплитель_xps: 0.04

  roofing:
    domain: "roofing"
    collections: ["12"]
    keywords:
      - кровл
      - крыш
      - водосток
      - мембран
    encyclopedia: "skills/krovlya-expert/ENCYCLOPEDIA_KROVLYA.md"

  hvac:
    domain: "hvac"
    collections: ["16", "17", "18", "20"]
    keywords:
      - вентиляц
      - отоплен
      - кондиц
      - водопровод
      - канализац
      - сантехн
    encyclopedia: "skills/ovik-expert/ENCYCLOPEDIA_OVIK.md"

  earthworks:
    domain: "earthworks"
    collections: ["01", "02"]
    keywords:
      - земляны
      - грунт
      - котлован
      - траншея
      - обратная засыпк

  finishing:
    domain: "finishing"
    collections: ["15"]
    keywords:
      - отделоч
      - малярн
      - покраск
      - обои
      - плитк

# ---------------------------------------------------------------------------
# LLM settings (used by expert agents)
# ---------------------------------------------------------------------------
llm:
  model: "openrouter/qwen/qwen3.6-plus:free"
  temperature: 0.2
  max_tokens: 4096

# ---------------------------------------------------------------------------
# Price indices (ФСНБ-2022 → target year)
# ---------------------------------------------------------------------------
indices:
  base_year: 2022
  target_year: 2025
  inflation: 1.18              # 2022→2025 (~5-6% годовых × 3 года)
  overhead_profit: 1.8         # НР + СП + НДС (среднее)
  # Computed: fer_combined = inflation × overhead_profit = 2.12
  # Computed: fssc = inflation = 1.18
  labor_base_rate: 740         # руб/чел-ч (ФСНБ-2022 базис)

# ---------------------------------------------------------------------------
# Excel column mapping (1-based)
# ---------------------------------------------------------------------------
columns:
  position_num: 1    # A — hierarchical position number
  ordinal: 2         # B — ordinal / type marker
  name: 6            # F — description
  unit: 7            # G — unit of measurement
  quantity: 8        # H — quantity
  unit_price: 15     # O — unit price
  total: 16          # P — total (formula)
  comment: 19        # S — comment

# ---------------------------------------------------------------------------
# General settings
# ---------------------------------------------------------------------------
settings:
  active_domains: ["masonry", "concrete"]
  tender_markup: 1.15
  confidence_thresholds:
    green: 0.70
    yellow: 0.40
  encyclopedia_max_chars: 12000
  max_parallel_experts: 6
  output_format: v3

# ---------------------------------------------------------------------------
# Construction Scheduling (4D BIM)
# ---------------------------------------------------------------------------
scheduling:
  default_crews:
    "01": 6    # Земляные работы
    "02": 6
    "03": 5    # Свайные
    "06": 5    # Бетон
    "07": 5    # Сборный ж/б
    "08": 4    # Кладка
    "09": 4    # Металлоконструкции
    "11": 4    # Полы
    "12": 4    # Кровля
    "15": 4    # Отделка
    "16": 3    # Сантехника
    "17": 3
    "18": 3    # Отопление
    "19": 3    # Вентиляция
    "20": 3    # Кондиционирование
    "21": 3    # Электрика
    "33": 3    # Слаботочные
    default: 4
  work_hours_per_day: 8
  work_days_per_week: 5
